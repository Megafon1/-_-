<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PROJECT HUB</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<header class="header">

    <div class="logo">PROJECT HUB</div>

    <input id="search" placeholder="Поиск проекта..." />

</header>

<section class="hero">

    <h1>Проекты из видео</h1>

    <p>
        Каталог проектов, которые используются в моих видеороликах.<br>
        Сортировка, бонусы и ссылки на ресурсы.
    </p>

</section>

<section id="list" class="grid">

    <div class="card" data-name="gama casino">
        <div class="title">Gama Casino</div>
        <div class="meta">Streamers: Zernavka</div>
        <div class="tag">100% + FS</div>
        <a href="https://example.com" class="btn">Открыть</a>
    </div>

    <div class="card" data-name="r7 casino">
        <div class="title">R7 Casino</div>
        <div class="meta">Streamers: Maks</div>
        <div class="tag">200% bonus</div>
        <a href="https://example.com" class="btn">Открыть</a>
    </div>

    <div class="card" data-name="1win">
        <div class="title">1win</div>
        <div class="meta">Streamers: Dosaia</div>
        <div class="tag">500% bonus</div>
        <a href="https://example.com" class="btn">Открыть</a>
    </div>

</section>

<script>
const input = document.getElementById("search");
const cards = document.querySelectorAll(".card");

input.addEventListener("input", () => {
    const value = input.value.toLowerCase();

    cards.forEach(card => {
        const name = card.dataset.name;
        card.style.display = name.includes(value) ? "block" : "none";
    });
});
</script>

</body>
</html>
